# ============================================================
# SAP CPI Artifact Extractor - Default Configuration
# ============================================================
# NOTE: This file contains only non-sensitive defaults.
# Credentials and tenant URL must be supplied via an external
# config file passed as a command-line argument:
#   java -jar cpi-artifact-extractor.jar /path/to/config.properties
# ============================================================

# --- API Endpoints (relative to base URL) ---
cpi.api.packages=/api/v1/IntegrationPackages
cpi.api.flows=/api/v1/IntegrationDesigntimeArtifacts
cpi.api.valuemappings=/api/v1/ValueMappingDesigntimeArtifacts
cpi.api.configurations=/api/v1/IntegrationDesigntimeArtifacts(Id='%s',Version='active')/$links/Configurations
cpi.api.runtime=/api/v1/IntegrationRuntimeArtifacts
cpi.api.dataStores=/api/v1/DataStores
cpi.api.variables=/api/v1/Variables
cpi.api.messageProcessingLogs=/api/v1/MessageProcessingLogs
cpi.api.numberRanges=/api/v1/NumberRanges
cpi.api.customTagConfigurations=/api/v1/CustomTagConfigurations

# --- Export Settings ---
export.format=xlsx
# Options: xlsx, csv, json, all
export.output.dir=./output
export.filename.prefix=cpi_artifacts

# --- Extraction Options ---
extract.packages=true
extract.flows=true
extract.valuemappings=true
extract.configurations=true
extract.runtime.status=true
extract.data.stores=false
extract.variables=false
extract.message.logs=false

# --- HTTP Settings ---
http.connect.timeout.ms=30000
http.read.timeout.ms=60000
http.max.retries=3
http.retry.delay.ms=2000
